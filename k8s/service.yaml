apiVersion: v1
kind: Service
metadata:
  name: my-app-service
spec:
  selector:
    app: my-app           # находит поды с этим лейблом
  ports:
    - protocol: TCP
      port: 80            # снаружи обращаемся на 80
      targetPort: 8000    # внутри контейнера слушаем 8000
  type: NodePort          # для локального minikube